approach:
  heading: Unser Ansatz
  paragraphs:
    - >-
      Im Waldkircher Ortsteil Batzenhäusle, zwischen Wald und Weinbergen, liegt
      unser Waldkindergarten für 3- bis 6-jährige Kinder. Unser Grundgedanke
      ist, das Kind als eigenständige Persönlichkeit zu sehen und dessen
      Entwicklung zu unterstützen.
    - >-
      Unser Alltag findet im Wald, in den nahegelegenen Weinbergen und an den
      Bauwägen statt — und das bei jedem Wetter.
